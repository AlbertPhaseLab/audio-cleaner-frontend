<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Audio Cleaner</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

    <!-- Header -->
    <div class="header">
        <h1 id="title">🎧 Audio Cleaner</h1>
        <p id="subtitle">Mejora automáticamente la calidad de tus audios</p>

        <!-- language -->
        <select id="lang" onchange="changeLang()">
            <option value="es">ES</option>
            <option value="en">EN</option>
        </select>
    </div>

    <!-- Card -->
    <div class="card">

        <input type="file" id="fileInput" />

        <label id="presetLabel">Preset:</label>
        <select id="preset">
            <option value="default">Default</option>
            <option value="podcast">Podcast</option>
            <option value="voz">Voz</option>
            <option value="reunion">Reunión</option>
        </select>

        <button id="btn" onclick="upload()">Limpiar audio</button>

        <p id="status"></p>

        <!-- Progress -->
        <div class="progress">
            <div id="progress-bar"></div>
        </div>

        <!-- Result -->
        <div id="result">
            <audio id="audioPlayer" controls></audio>
            <a id="downloadBtn" download="cleaned.mp3">⬇️ Descargar</a>
        </div>

    </div>

</div>

<script src="js/app.js"></script>
</body>
</html>
